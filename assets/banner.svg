<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-gradient)" />

  <!-- Abstract Geometric Shapes representing formal logic & networks -->
  <g opacity="0.3" filter="url(#glow)">
    <circle cx="200" cy="100" r="120" fill="#6366f1" opacity="0.5" />
    <circle cx="1000" cy="300" r="150" fill="#ec4899" opacity="0.4" />
    <polygon points="500,50 650,250 350,200" fill="#a855f7" opacity="0.3" />
  </g>

  <!-- Code/Formal logic lattice graphic lines in the background -->
  <path d="M 100,200 L 300,100 L 500,250 L 700,150 L 900,300 L 1100,200" stroke="#4f46e5" stroke-width="2" fill="none" opacity="0.4" />
  <path d="M 100,250 L 350,150 L 600,300 L 850,200 L 1100,250" stroke="#d946ef" stroke-width="1.5" fill="none" stroke-dasharray="10 5" opacity="0.3" />

  <!-- Main Title -->
  <text x="50%" y="170" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="62" font-weight="900" fill="url(#text-gradient)" text-anchor="middle" letter-spacing="4">
    AWESOME AUTOFORMALIZATION
  </text>

  <!-- Subtitle -->
  <text x="50%" y="225" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="8">
    NATURAL LANGUAGE ➔ MACHINE VERIFIABLE LOGIC
  </text>

  <!-- Decorative Accent Bar -->
  <rect x="350" y="250" width="500" height="4" rx="2" fill="url(#accent-gradient)" />

  <!-- Small Nodes representing neural to formal translation -->
  <circle cx="350" cy="252" r="6" fill="#6366f1" />
  <circle cx="600" cy="252" r="6" fill="#a855f7" />
  <circle cx="850" cy="252" r="6" fill="#ec4899" />
</svg>
